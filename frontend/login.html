 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – BAJA RuleBot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo">
      <div class="logo-badge">BAJA</div>
      <span class="logo-text">RuleBot</span>
    </div>
  </nav>

  <!-- LOGIN SECTION -->
  <div class="upload-container">
    <h2>Welcome to <span>BAJA RuleBot</span></h2>
    <p>Select your role to continue</p>

    <div class="upload-box" style="max-width:450px;">
      <div style="font-size:60px; text-align:center; margin-bottom:20px;">🏁</div>

      <div style="margin-bottom:20px;">
        <label style="color:#9ca3af; font-size:14px; display:block; margin-bottom:8px;">
          Your Name
        </label>
        <input
          type="text"
          id="userName"
          placeholder="Enter your name"
          style="width:100%; background:#374151; color:white; border:none;
                 padding:12px 16px; border-radius:10px; font-size:14px; outline:none;"
        />
      </div>

      <div style="margin-bottom:20px;">
        <label style="color:#9ca3af; font-size:14px; display:block; margin-bottom:8px;">
          Your Team
        </label>
        <input
          type="text"
          id="teamName"
          placeholder="Enter your team name"
          style="width:100%; background:#374151; color:white; border:none;
                 padding:12px 16px; border-radius:10px; font-size:14px; outline:none;"
        />
      </div>

      <div style="margin-bottom:30px;">
        <label style="color:#9ca3af; font-size:14px; display:block; margin-bottom:8px;">
          Select Your Role
        </label>
        <select
          id="userRole"
          style="width:100%; background:#374151; color:white; border:none;
                 padding:12px 16px; border-radius:10px; font-size:14px; outline:none; cursor:pointer;"
        >
          <option value="">-- Select Role --</option>
          <option value="Team Member">👤 Team Member</option>
          <option value="Team Captain">👑 Team Captain</option>
          <option value="Faculty Advisor">🎓 Faculty Advisor</option>
          <option value="Finance Manager">💰 Finance Manager</option>
          <option value="Department Manager">🏢 Department Manager</option>
        </select>
      </div>

      <button
        class="btn-orange"
        onclick="handleLogin()"
        style="width:100%;"
      >
        Continue →
      </button>

      <p id="errorMsg" style="color:red; text-align:center; margin-top:12px; display:none;">
        Please fill all fields!
      </p>
    </div>
  </div>

  <script>
    function handleLogin() {
      const name = document.getElementById('userName').value.trim()
      const team = document.getElementById('teamName').value.trim()
      const role = document.getElementById('userRole').value

      if (!name || !team || !role) {
        document.getElementById('errorMsg').style.display = 'block'
        return
      }

      // Save to localStorage
      localStorage.setItem('userName', name)
      localStorage.setItem('teamName', team)
      localStorage.setItem('userRole', role)

      // Go to upload page
      window.location.href = 'upload.html'
    }
  </script>

</body>
</html>
