 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Rulebook – BAJA RuleBot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo">
      <div class="logo-badge">BAJA</div>
      <span class="logo-text">RuleBot</span>
    </div>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Upload Rulebook</a></li>
      <li><a href="chat.html">Chat</a></li>
    </ul>
  </nav>

  <!-- UPLOAD SECTION -->
  <div class="upload-container">
    <h2>Upload <span>Rulebook</span></h2>
    <p>Upload the BAJA competition rulebook PDF to get started</p>

    <div class="upload-box">
      <div class="upload-icon">📂</div>
      <p>Supported format: PDF only</p>

      <input
        type="file"
        accept=".pdf"
        id="fileInput"
        style="display:none"
        onchange="handleFile()"
      />

      <label for="fileInput" class="file-label" id="fileLabel">
        Choose PDF File
      </label>

      <p class="success-msg" id="successMsg">
        ✅ Rulebook Uploaded Successfully!
      </p>

      <button
        class="btn-orange"
        id="uploadBtn"
        style="display:none; width:100%"
        onclick="handleUpload()"
      >
        Upload Rulebook
      </button>

      <button
        class="btn-orange"
        id="chatBtn"
        style="display:none; width:100%; margin-top:12px"
        onclick="window.location.href='chat.html'"
      >
        Go to Chat →
      </button>
    </div>
  </div>

  <script>
    function handleFile() {
      const file = document.getElementById('fileInput').files[0]
      if (file) {
        document.getElementById('fileLabel').textContent = file.name
        document.getElementById('uploadBtn').style.display = 'block'
      }
    }

    function handleUpload() {
      const btn = document.getElementById('uploadBtn')
      btn.textContent = 'Uploading...'
      btn.disabled = true

      setTimeout(() => {
        document.getElementById('successMsg').style.display = 'block'
        document.getElementById('uploadBtn').style.display = 'none'
        document.getElementById('chatBtn').style.display = 'block'
      }, 2000)
    }
  </script>

</body>
</html>
