 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Rulebook – BAJA RuleBot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-logo">
      <div class="logo-badge">BAJA</div>
      <span class="logo-text">RuleBot</span>
    </div>
    <ul class="navbar-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Upload Rulebook</a></li>
      <li><a href="chat.html">Chat</a></li>
      <li><a href="checklist.html">Checklist</a></li>
    </ul>
  </nav>

  <!-- UPLOAD SECTION -->
  <div class="upload-container">
    <h2>Upload <span>Rulebook</span></h2>
    <p>Upload the BAJA competition rulebook PDF to get started</p>

    <div class="upload-box">
      <div class="upload-icon">📂</div>
      <p>Supported format: PDF only</p>

      <input
        type="file"
        accept=".pdf"
        id="fileInput"
        style="display:none"
        onchange="handleFile()"
      />

      <label for="fileInput" class="file-label" id="fileLabel">
        Choose PDF File
      </label>

      <p class="success-msg" id="successMsg">
        ✅ Rulebook Uploaded Successfully!
      </p>

      <button
        class="btn-orange"
        id="uploadBtn"
        style="display:none; width:100%"
        onclick="handleUpload()"
      >
        Upload Rulebook
      </button>

      <button
        class="btn-orange"
        id="chatBtn"
        style="display:none; width:100%; margin-top:12px"
        onclick="window.location.href='chat.html'"
      >
        Go to Chat →
      </button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "http://127.0.0.1:8000"

function handleFile() {
  const file = document.getElementById('fileInput').files[0]
  if (file) {
    document.getElementById('fileLabel').textContent = file.name
    document.getElementById('uploadBtn').style.display = 'block'
  }
}

function handleUpload() {
  const file = document.getElementById('fileInput').files[0]
  if (!file) return

  const btn = document.getElementById('uploadBtn')
  btn.textContent = 'Uploading...'
  btn.disabled = true

  const formData = new FormData()
  formData.append('file', file)

  fetch(`${BACKEND_URL}/upload`, {
    method: 'POST',
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('successMsg').style.display = 'block'
    document.getElementById('successMsg').textContent = 
      `✅ Rulebook Uploaded! ${data.words_extracted} words extracted!`
    document.getElementById('uploadBtn').style.display = 'none'
    document.getElementById('chatBtn').style.display = 'block'
  })
  .catch(err => {
    btn.textContent = 'Upload Failed! Try Again'
    btn.disabled = false
  })
}
  </script>

</body>
</html>
